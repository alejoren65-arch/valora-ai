<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VALORA.AI | Motor DCF Inteligente</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}
.container {
    max-width: 800px;
    margin: auto;
    padding: 40px;
}
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}
button {
    padding: 12px 20px;
    background: #38bdf8;
    border: none;
    font-weight: bold;
    cursor: pointer;
}
.result {
    margin-top: 30px;
    background: #1e293b;
    padding: 20px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h1>VALORA.AI</h1>
<p>Motor de Valoración DCF Automatizado</p>

<h3>Datos de Entrada</h3>

<label>Flujo de Caja Actual (USD)</label>
<input type="number" id="fcf" placeholder="Ej: 1000000">

<label>Crecimiento Esperado (%)</label>
<input type="number" id="growth" placeholder="Ej: 5">

<label>WACC (%)</label>
<input type="number" id="wacc" placeholder="Ej: 10">

<label>Crecimiento Terminal (%)</label>
<input type="number" id="terminal" placeholder="Ej: 2">

<button onclick="calcularDCF()">Calcular Valoración</button>

<div class="result" id="resultado" style="display:none;"></div>

</div>

<script>

function calcularDCF() {

    let fcf = parseFloat(document.getElementById("fcf").value);
    let growth = parseFloat(document.getElementById("growth").value) / 100;
    let wacc = parseFloat(document.getElementById("wacc").value) / 100;
    let terminalGrowth = parseFloat(document.getElementById("terminal").value) / 100;

    let years = 5;
    let valorPresente = 0;
    let flujo = fcf;

    for (let i = 1; i <= years; i++) {
        flujo *= (1 + growth);
        valorPresente += flujo / Math.pow((1 + wacc), i);
    }

    let valorTerminal = (flujo * (1 + terminalGrowth)) / (wacc - terminalGrowth);
    let valorTerminalDescontado = valorTerminal / Math.pow((1 + wacc), years);

    let enterpriseValue = valorPresente + valorTerminalDescontado;

    document.getElementById("resultado").style.display = "block";
    document.getElementById("resultado").innerHTML = `
        <h2>Resultado</h2>
        <p>Valor Presente Flujos: $${valorPresente.toLocaleString()}</p>
        <p>Valor Terminal Descontado: $${valorTerminalDescontado.toLocaleString()}</p>
        <h3>Enterprise Value: $${enterpriseValue.toLocaleString()}</h3>
    `;
}

</script>

</body>
</html>
