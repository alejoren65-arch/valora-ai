<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VALORA.AI | Plataforma Inteligente</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}
.page{
    display:none;
    padding:40px;
    max-width:1000px;
    margin:auto;
}
.active{
    display:block;
}
button{
    padding:12px 20px;
    background:#38bdf8;
    border:none;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
}
button:hover{
    background:#0ea5e9;
}
input{
    width:100%;
    padding:8px;
    margin:8px 0;
}
canvas{
    background:white;
    border-radius:8px;
    padding:10px;
}
.center{text-align:center;}
.section{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page active" id="home">
    <div class="center">
        <h1>VALORA.AI</h1>
        <p>Plataforma Inteligente de Valoración Empresarial</p>
        <button onclick="goTo('form')">Comenzar Análisis</button>
    </div>
</div>

<!-- PAGE 2 -->
<div class="page" id="form">
    <h2>Ingreso de Datos</h2>

    <label>Flujo de Caja Libre (USD)</label>
    <input type="number" id="fcf" value="1000000">

    <label>Crecimiento (%)</label>
    <input type="number" id="growth" value="5">

    <label>Tasa Libre de Riesgo (%)</label>
    <input type="number" id="rf" value="4">

    <label>Prima de Mercado (%)</label>
    <input type="number" id="mrp" value="6">

    <label>Beta</label>
    <input type="number" id="beta" value="1.2">

    <label>Deuda (USD)</label>
    <input type="number" id="debt" value="2000000">

    <button onclick="calcular()">Continuar</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="analysis">
    <h2>Procesando Análisis...</h2>
    <p>La IA interna está evaluando la empresa.</p>
</div>

<!-- PAGE 4 -->
<div class="page" id="results">
    <h2>Resultados Finales</h2>

    <div class="section" id="summary"></div>

    <div class="section">
        <h3>Proyección de Flujos</h3>
        <canvas id="flowChart"></canvas>
    </div>

    <div class="section">
        <h3>Sensibilidad a WACC</h3>
        <canvas id="waccChart"></canvas>
    </div>

    <div class="section">
        <h3>Recomendación IA</h3>
        <div id="aiRecommendation"></div>
    </div>

    <button onclick="goTo('home')">Nuevo Análisis</button>
</div>

<script>

function goTo(page){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
}

function calcular(){

goTo("analysis");

setTimeout(()=>{

let fcf = parseFloat(document.getElementById("fcf").value);
let growth = parseFloat(document.getElementById("growth").value)/100;
let rf = parseFloat(document.getElementById("rf").value)/100;
let mrp = parseFloat(document.getElementById("mrp").value)/100;
let beta = parseFloat(document.getElementById("beta").value);
let debt = parseFloat(document.getElementById("debt").value);

let costEquity = rf + beta * mrp;
let wacc = costEquity;
let years = 10;

let flujo = fcf;
let pv = 0;
let flows=[];

for(let i=1;i<=years;i++){
    flujo *= (1+growth);
    flows.push(flujo);
    pv += flujo/Math.pow((1+wacc),i);
}

let terminal = (flujo*1.02)/(wacc-0.02);
pv += terminal/Math.pow((1+wacc),years);

let ev = pv;
let equity = ev - debt;

let recommendation = generarRecomendacion(beta,wacc,growth,equity);

document.getElementById("summary").innerHTML=`
<p><b>Costo de Equity:</b> ${(costEquity*100).toFixed(2)}%</p>
<p><b>Enterprise Value:</b> $${ev.toLocaleString()}</p>
<p><b>Equity Value:</b> $${equity.toLocaleString()}</p>
`;

renderCharts(flows,wacc,fcf,growth,debt);

document.getElementById("aiRecommendation").innerHTML=recommendation;

goTo("results");

},2000);
}

function generarRecomendacion(beta,wacc,growth,equity){

let score=0;
if(beta<1.1) score+=2;
if(growth>0.05) score+=2;
if(wacc<0.10) score+=2;

if(score>=5)
return "<h3>Recomendación: COMPRAR</h3><p>Perfil sólido con crecimiento atractivo y riesgo controlado.</p>";

if(score>=3)
return "<h3>Recomendación: MANTENER</h3><p>Riesgo moderado. Se recomienda monitoreo continuo.</p>";

return "<h3>Recomendación: ALTO RIESGO</h3><p>Elevada sensibilidad y volatilidad esperada.</p>";
}

function renderCharts(flows,wacc,fcf,growth,debt){

new Chart(document.getElementById("flowChart"),{
type:"line",
data:{
labels:flows.map((_,i)=>"Año "+(i+1)),
datasets:[{
label:"Flujos Proyectados",
data:flows,
borderColor:"blue",
fill:false
}]
}
});

let labels=[],values=[];
for(let i=-2;i<=2;i++){
let newW=wacc+i*0.01;
let val=calcEV(fcf,growth,newW)-debt;
labels.push((newW*100).toFixed(2)+"%");
values.push(val);
}

new Chart(document.getElementById("waccChart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Equity Value",
data:values,
backgroundColor:"green"
}]
}
});
}

function calcEV(fcf,growth,wacc){
let flujo=fcf;
let pv=0;
for(let i=1;i<=10;i++){
flujo*=(1+growth);
pv+=flujo/Math.pow((1+wacc),i);
}
let terminal=(flujo*1.02)/(wacc-0.02);
pv+=terminal/Math.pow((1+wacc),10);
return pv;
}

</script>

</body>
</html>
