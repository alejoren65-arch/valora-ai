<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VALORA.AI | Plataforma Integral de Valoración</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
}
.container {
    max-width: 1200px;
    margin: auto;
    padding: 30px;
}
h1 { text-align: center; }
.section {
    background: #1e293b;
    padding: 25px;
    border-radius: 10px;
    margin-bottom: 25px;
}
input, select {
    width: 100%;
    padding: 8px;
    margin: 6px 0;
}
button {
    padding: 12px 18px;
    background: #38bdf8;
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}
button:hover {
    background: #0ea5e9;
}
.result {
    margin-top: 20px;
}
canvas {
    background: white;
    border-radius: 8px;
    padding: 10px;
}
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>VALORA.AI</h1>
<p style="text-align:center;">Plataforma profesional de análisis financiero y valoración empresarial</p>

<div class="section">

<h3>Entradas Financieras</h3>

<label>Flujo de Caja Libre Actual (USD)</label>
<input type="number" id="fcf" value="1000000">

<label>Crecimiento Esperado (%)</label>
<input type="number" id="growth" value="5">

<label>Tasa Libre de Riesgo (%)</label>
<input type="number" id="rf" value="4">

<label>Prima de Mercado (%)</label>
<input type="number" id="mrp" value="6">

<label>Beta</label>
<input type="number" id="beta" value="1.2">

<label>Deuda Total (USD)</label>
<input type="number" id="debt" value="2000000">

<label>Crecimiento Terminal (%)</label>
<input type="number" id="terminal" value="2">

<label>Escenario</label>
<select id="scenario">
<option value="base">Base</option>
<option value="optimista">Optimista</option>
<option value="pesimista">Pesimista</option>
</select>

<button onclick="analizar()">Ejecutar Análisis Completo</button>

</div>

<div class="section result" id="output" style="display:none;"></div>

<div class="grid">

<div class="section">
<h3>Proyección de Flujos</h3>
<canvas id="cashFlowChart"></canvas>
</div>

<div class="section">
<h3>Sensibilidad WACC</h3>
<canvas id="waccChart"></canvas>
</div>

<div class="section">
<h3>Sensibilidad Crecimiento</h3>
<canvas id="growthChart"></canvas>
</div>

<div class="section">
<h3>Escenarios</h3>
<canvas id="scenarioChart"></canvas>
</div>

</div>

</div>

<script>

function analizar(){

let fcf = parseFloat(fcfInput());
let growth = percent("growth");
let rf = percent("rf");
let mrp = percent("mrp");
let beta = parseFloat(document.getElementById("beta").value);
let debt = parseFloat(document.getElementById("debt").value);
let terminalGrowth = percent("terminal");
let scenario = document.getElementById("scenario").value;

if(scenario==="optimista"){ growth+=0.02; }
if(scenario==="pesimista"){ growth-=0.02; }

let costOfEquity = rf + beta * mrp;
let wacc = costOfEquity;

let years = 10;
let flujo = fcf;
let pv = 0;
let flows=[];

for(let i=1;i<=years;i++){
    flujo *= (1+growth);
    flows.push(flujo);
    pv += flujo/Math.pow((1+wacc),i);
}

let terminalValue = (flujo*(1+terminalGrowth))/(wacc-terminalGrowth);
let discountedTV = terminalValue/Math.pow((1+wacc),years);

let enterpriseValue = pv + discountedTV;
let equityValue = enterpriseValue - debt;

let riskScore = riskEvaluation(beta,wacc,growth);

renderResults(costOfEquity,wacc,enterpriseValue,equityValue,riskScore);
renderCharts(flows,wacc,fcf,growth,terminalGrowth,debt);

}

function fcfInput(){ return document.getElementById("fcf").value; }
function percent(id){ return parseFloat(document.getElementById(id).value)/100; }

function riskEvaluation(beta,wacc,growth){
let score=0;
if(beta>1.3) score+=2;
if(wacc>0.12) score+=2;
if(growth<0.03) score+=1;

if(score>=4) return "Alto Riesgo";
if(score>=2) return "Riesgo Moderado";
return "Riesgo Bajo";
}

function renderResults(costOfEquity,wacc,ev,eq,risk){

document.getElementById("output").style.display="block";
document.getElementById("output").innerHTML=`
<h2>Resultados del Análisis</h2>
<p><b>Costo de Equity (CAPM):</b> ${(costOfEquity*100).toFixed(2)}%</p>
<p><b>WACC:</b> ${(wacc*100).toFixed(2)}%</p>
<p><b>Enterprise Value:</b> $${ev.toLocaleString()}</p>
<p><b>Equity Value:</b> $${eq.toLocaleString()}</p>
<p><b>Evaluación de Riesgo:</b> ${risk}</p>
<p><b>Modelo:</b> DCF 10 años + CAPM + Gordon Growth</p>
<p><b>Referencias:</b> Brealey & Myers (Corporate Finance), Damodaran (Investment Valuation), CAPM – Sharpe (1964)</p>
`;
}

function renderCharts(flows,wacc,fcf,growth,terminalGrowth,debt){

new Chart(document.getElementById("cashFlowChart"),{
type:"line",
data:{
labels:flows.map((_,i)=>"Año "+(i+1)),
datasets:[{label:"Flujos Proyectados",data:flows,borderColor:"blue"}]
}
});

let waccLabels=[],waccValues=[];
for(let i=-3;i<=3;i++){
let newW=wacc+i*0.01;
let val=calculateEV(fcf,growth,newW,terminalGrowth,10)-debt;
waccLabels.push((newW*100).toFixed(2)+"%");
waccValues.push(val);
}
new Chart(document.getElementById("waccChart"),{
type:"bar",
data:{labels:waccLabels,datasets:[{label:"Equity Value",data:waccValues,backgroundColor:"green"}]}
});

let gLabels=[],gValues=[];
for(let i=-3;i<=3;i++){
let newG=growth+i*0.01;
let val=calculateEV(fcf,newG,wacc,terminalGrowth,10)-debt;
gLabels.push((newG*100).toFixed(2)+"%");
gValues.push(val);
}
new Chart(document.getElementById("growthChart"),{
type:"bar",
data:{labels:gLabels,datasets:[{label:"Equity Value",data:gValues,backgroundColor:"orange"}]}
});

let scen=["Pesimista","Base","Optimista"];
let scenValues=[
calculateEV(fcf,growth-0.02,wacc,terminalGrowth,10)-debt,
calculateEV(fcf,growth,wacc,terminalGrowth,10)-debt,
calculateEV(fcf,growth+0.02,wacc,terminalGrowth,10)-debt
];
new Chart(document.getElementById("scenarioChart"),{
type:"bar",
data:{labels:scen,datasets:[{label:"Equity Value por Escenario",data:scenValues,backgroundColor:"purple"}]}
});

}

function calculateEV(fcf,growth,wacc,terminalGrowth,years){
let flujo=fcf;
let pv=0;
for(let i=1;i<=years;i++){
flujo*=(1+growth);
pv+=flujo/Math.pow((1+wacc),i);
}
let tv=(flujo*(1+terminalGrowth))/(wacc-terminalGrowth);
pv+=tv/Math.pow((1+wacc),years);
return pv;
}

</script>

</body>
</html>
